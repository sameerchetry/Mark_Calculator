<!DOCTYPE html>
<html>
<head>
    <title>Mark Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Mark Calculator</h1>

    <input type="number" id="math" placeholder="Mathematics (100)">
    <input type="number" id="science" placeholder="Science (100)">
    <input type="number" id="english" placeholder="English (100)">
    <input type="number" id="ss" placeholder="Social Science (100)">
    <input type="number" id="geo" placeholder="Geography (100)">
    <input type="number" id="hindi" placeholder="Hindi (50)">
    <input type="number" id="e3" placeholder="English 3rd (50)">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
